<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holo Image Admin</title>
  <link rel="stylesheet" href="/admin/assets/styles.css" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="headline">
        <p class="eyebrow">Holo Image Admin</p>
        <h1>新实例唯一管理面板</h1>
        <p class="subtext">围绕当前线上实例、迁移状态和号池自恢复能力做集中控制。</p>
      </div>
      <div class="auth-card">
        <label for="adminToken">Admin Key</label>
        <input id="adminToken" type="password" autocomplete="off" placeholder="输入 admin key" />
        <div class="auth-actions">
          <button id="saveTokenBtn" type="button">保存</button>
          <button id="refreshBtn" type="button">刷新状态</button>
        </div>
      </div>
    </header>

    <main class="dashboard">
      <section class="panel" id="overviewCard"></section>
      <section class="panel" id="persistenceCard"></section>
      <section class="panel" id="migrationCard"></section>
      <section class="panel" id="controlsCard"></section>
      <section class="panel" id="domainCard"></section>
      <section class="panel danger" id="retireCard"></section>
      <section class="panel log-panel" id="logCard"></section>
    </main>
  </div>
  <script src="/admin/assets/app.js"></script>
</body>
</html>
