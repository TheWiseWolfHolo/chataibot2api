<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holo Image Admin</title>
  <link rel="stylesheet" href="/admin/assets/styles.css" />
</head>
<body class="admin-body">
  <div class="page-shell">
    <header class="topbar">
      <div>
        <p class="caption">HOLO IMAGE ADMIN</p>
        <h1>服务状态</h1>
        <p class="subtle" id="topline">正在检查当前会话与实例状态。</p>
      </div>
      <div class="topbar-actions">
        <span class="badge" id="refreshState">未刷新</span>
        <button type="button" class="button secondary" id="refreshBtn">刷新</button>
        <button type="button" class="button ghost" id="logoutBtn">退出</button>
      </div>
    </header>

    <main class="layout">
      <section class="surface">
        <div class="section-head">
          <div>
            <p class="caption">首屏</p>
            <h2>当前实例</h2>
          </div>
          <p class="section-note">这里先看 live、号池、补号、最后错误和刷新时间。</p>
        </div>
        <div class="metrics-grid" id="statusGrid"></div>
      </section>

      <section class="surface">
        <div class="section-head">
          <div>
            <p class="caption">POOL</p>
            <h2>号池</h2>
          </div>
        </div>
        <div id="poolSection"></div>
      </section>

      <section class="surface">
        <div class="section-head">
          <div>
            <p class="caption">MODELS</p>
            <h2>模型支持</h2>
          </div>
        </div>
        <div id="modelsSection"></div>
      </section>

      <section class="surface">
        <div class="section-head">
          <div>
            <p class="caption">MIGRATION</p>
            <h2>迁移结果</h2>
          </div>
        </div>
        <div id="migrationSection"></div>
      </section>

      <section class="surface">
        <div class="section-head">
          <div>
            <p class="caption">ACTIONS</p>
            <h2>常用操作</h2>
          </div>
        </div>
        <div id="actionsSection"></div>
      </section>

      <section class="surface danger-surface">
        <div class="section-head">
          <div>
            <p class="caption">DANGER</p>
            <h2>危险操作</h2>
          </div>
        </div>
        <div id="dangerSection"></div>
      </section>

      <section class="surface">
        <div class="section-head">
          <div>
            <p class="caption">LOG</p>
            <h2>日志</h2>
          </div>
        </div>
        <div id="logSection"></div>
      </section>
    </main>
  </div>

  <script src="/admin/assets/app.js"></script>
</body>
</html>
